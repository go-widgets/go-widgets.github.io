<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="go-widgets">
  <defs>
    <linearGradient id="gw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="240" height="240" rx="44" fill="url(#gw)"/>
  <!-- Three stacked "widget" rectangles suggesting a stacked pane of controls. -->
  <rect x="52" y="60"  width="152" height="32" rx="8" fill="#ffffff" opacity="0.94"/>
  <rect x="52" y="110" width="104" height="32" rx="8" fill="#ffffff" opacity="0.82"/>
  <rect x="52" y="160" width="152" height="32" rx="8" fill="#ffffff" opacity="0.70"/>
  <!-- Small dot on the second row = cursor / focus indicator. -->
  <circle cx="180" cy="126" r="10" fill="#ffffff"/>
</svg>
