baseURL = "https://go-widgets.github.io/"
title = "go-widgets"
disableKinds = ["taxonomy", "term", "RSS", "sitemap", "404"]

[markup.goldmark.renderer]
  unsafe = true

[[params.components]]
  name = "toolkit"
  status = "ready"
  blurb = "**[toolkit](https://github.com/go-widgets/toolkit)** — pure-Go pixel-blitting widget set, **68 widgets**: the GTK-4 / DaisyUI staples (Button, Entry, TreeView, Menu, Notebook, Dialog, …), a chart family (LineChart / BarChart / PieChart), DatePicker, RangeSlider, MarkdownView, ContextMenu, an Overlay stacking container, drag-and-drop events, an opt-in accessibility bridge, and a pluggable scalable `Font` (with FontChooser). 100% statement coverage. `LoadGTKTheme(css)` parses libadwaita/GTK3 `@define-color` → `Theme`."
[[params.components]]
  name = "Byte-buffer first"
  status = "ready"
  blurb = "Every widget composes pixels into a caller-supplied `[]byte`. No JS, no DOM, no canvas dep at the toolkit level. Works identically in `GOOS=js GOARCH=wasm` (browser SharedArrayBuffer clients), on any native Go target (native canvas backends, PNG output), or in headless tests (screenshot-hash regressions)."
[[params.components]]
  name = "GTK-theme aware"
  status = "ready"
  blurb = "`LoadGTKTheme(css)` reads any GTK3 / libadwaita `@define-color` block (Adwaita, Juno, WhiteSur, Solarized …) and hands you a `Theme` value that cascades through every widget. One assignment, whole app repaints."
[[params.components]]
  name = "svg — RGBA → SVG snapshot"
  status = "ready"
  blurb = "**[svg](https://github.com/go-widgets/svg)** — wraps any RGBA render (a toolkit widget composition or any other pixel producer) in a self-contained SVG with the pixels embedded as a base-64 PNG. Bit-exact, scales crisply. Sibling `svg/widget` takes a `toolkit.Widget` directly; `svg/cmd/gallery-render` batch-renders every widget kind. See the [live snapshot gallery](https://go-widgets.github.io/svg/). 100 % statement coverage."
[[params.components]]
  name = "gallery — live wasm demo"
  status = "ready"
  blurb = "**[gallery](https://github.com/go-widgets/gallery)** — a browser wasm live-demo running the toolkit's full widget family set on a plain canvas. See it at [go-widgets.github.io/gallery](https://go-widgets.github.io/gallery/). No SharedArrayBuffer, no COOP/COEP; drops into any static host."
[[params.components]]
  name = "tui — terminal cell widgets"
  status = "ready"
  blurb = "**[tui](https://github.com/go-widgets/tui)** — pure-Go cell-native widget set that renders into a terminal cell grid via a `CellPainter` (the same `painter.Painter` seam the pixel backend uses). 34 widgets + a FocusRing, plus a Sparkline mini-chart, syntax-highlighted TextEditor, and dogfooding demos (tui-explorer / tui-editor / tui-widget-explorer). Same byte-buffer-first axiom, terminal backing store. 100% statement coverage."
